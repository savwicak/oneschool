<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="stylesheet" href="src/css/output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body class="bg-creame min-h-screen flex items-center justify-center p-3 md:p-6 lg:p-0 montserrat">
    <div class="w-full px-3 md:px-8 lg:px-0 py-8 md:py-12">
        <div class="mx-auto max-w-7xl">
            <div class="bg-white rounded-2xl md:rounded-3xl lg:rounded-[40px] p-6 md:p-10 lg:p-20 shadow-xl">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12 lg:gap-20 items-center">
                    <!-- Left Side -->
                    <div>
                        <p class="text-dark-yellow font-semibold mb-3 md:mb-4 text-xs md:text-sm lg:text-base">
                            GET STARTED TODAY
                        </p>

                        <h1 class="gasoek-one-regular text-dark-yellow text-3xl md:text-3xl lg:text-5xl mb-4 md:mb-6 leading-snug font-bold">
                            JOIN YOUR
                            <br>
                            EXTRACURRICULAR
                            <br>
                            COMMUNITY
                        </h1>

                        <p class="text-gray-600 text-xs md:text-sm lg:text-lg leading-relaxed">
                            Create your account to manage activities, track attendance,
                            monitor club finances, and stay updated with
                            the latest announcements.
                        </p>
                    </div>

                    <!-- Right Side - Form -->
                    <div class="w-full">
                        <form class="space-y-4 md:space-y-5 lg:space-y-6">
                            <!-- Full Name -->
                            <div>
                                <label class="block mb-2 font-semibold text-xs md:text-sm lg:text-base text-gray-700">
                                    Full Name
                                </label>
                                <input
                                    type="text"
                                    placeholder="Enter your full name"
                                    class="w-full px-4 py-2.5 md:py-3 lg:py-4 rounded-lg md:rounded-xl border-2 border-gray-300 focus:outline-none focus:border-yellow focus:ring-2 focus:ring-yellow/30 text-xs md:text-sm lg:text-base transition"
                                >
                            </div>

                            <!-- Email -->
                            <div>
                                <label class="block mb-2 font-semibold text-xs md:text-sm lg:text-base text-gray-700">
                                    Email
                                </label>
                                <input
                                    type="email"
                                    placeholder="Enter your email"
                                    class="w-full px-4 py-2.5 md:py-3 lg:py-4 rounded-lg md:rounded-xl border-2 border-gray-300 focus:outline-none focus:border-yellow focus:ring-2 focus:ring-yellow/30 text-xs md:text-sm lg:text-base transition"
                                >
                            </div>

                            <!-- Password -->
                            <div>
                                <label class="block mb-2 font-semibold text-xs md:text-sm lg:text-base text-gray-700">
                                    Password
                                </label>
                                <input
                                    type="password"
                                    placeholder="Enter your password"
                                    class="w-full px-4 py-2.5 md:py-3 lg:py-4 rounded-lg md:rounded-xl border-2 border-gray-300 focus:outline-none focus:border-yellow focus:ring-2 focus:ring-yellow/30 text-xs md:text-sm lg:text-base transition"
                                >
                            </div>

                            <!-- Confirm Password -->
                            <div>
                                <label class="block mb-2 font-semibold text-xs md:text-sm lg:text-base text-gray-700">
                                    Confirm Password
                                </label>
                                <input
                                    type="password"
                                    placeholder="Confirm your password"
                                    class="w-full px-4 py-2.5 md:py-3 lg:py-4 rounded-lg md:rounded-xl border-2 border-gray-300 focus:outline-none focus:border-yellow focus:ring-2 focus:ring-yellow/30 text-xs md:text-sm lg:text-base transition"
                                >
                            </div>

                            <!-- Terms Checkbox -->
                            <label class="flex items-start cursor-pointer text-xs md:text-sm">
                                <input type="checkbox" class="w-4 h-4 rounded mt-1">
                                <span class="ml-2 text-gray-600">
                                    I agree to the <a href="#" class="text-dark-yellow font-semibold hover:underline">Terms & Conditions</a>
                                </span>
                            </label>

                            <!-- Sign Up Button -->
                            <a
                                href="dashboard.html"
                                class="block w-full text-center bg-dark-yellow text-white font-semibold py-2.5 md:py-3 lg:py-4 rounded-lg md:rounded-xl border-2 border-dark-yellow transition-all duration-300 hover:bg-white hover:text-dark-yellow text-xs md:text-sm lg:text-base active:scale-95"
                            >
                                Create Account
                            </a>

                            <!-- Sign In Link -->
                            <p class="text-center text-gray-600 text-xs md:text-sm lg:text-base">
                                Already have an account?
                                <a href="login.html" class="text-dark-yellow font-semibold hover:underline transition">
                                    Sign In
                                </a>
                            </p>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
